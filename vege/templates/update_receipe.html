<!DOCTYPE html>
<html>
<head>
  <title>Recipe Form</title>

  <!-- Bootstrap CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="background-color: #f5f5f5;">

<div class="container mt-5" style="max-width: 600px;">

  <form method="POST" enctype="multipart/form-data">
    {% csrf_token %}

    <h2 class="text-center mb-3">UPDATE RECIPE</h2>
    <hr>

    <!-- Recipe Name -->
    <div class="mb-3">
      <label class="form-label">Recipe name</label>
      <input type="text" name="receipe_name" value="{{receipe.receipe_name}}" class="form-control" required>
    </div>

    <!-- Description -->
    <div class="mb-3">
      <label class="form-label">Recipe description</label>
      <textarea name="receipe_description" value="" class="form-control" rows="3" required>{{receipe.receipe_description}}</textarea>
    </div>

    <!-- Image -->
    <div class="mb-3">
      <label class="form-label">Recipe Image</label>
      <input type="file" name="receipe_image" class="form-control">
    </div>

    <!-- Button -->
    <button type="submit" class="btn btn-success w-100">Updated Recipe</button>

  </form>





<br>
<br>
<br>
<br>










</div>

</body>
</html>
